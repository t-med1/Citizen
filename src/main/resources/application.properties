spring.application.name=citizen-complaint-platform
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/citizen_platform
spring.datasource.username=pro
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=src/main/resources/static/uploads

logging.level.org.springframework.security=INFO
logging.level.com.company.platform=DEBUG
