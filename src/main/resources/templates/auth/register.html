<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Créer un compte — CitizenConnect</title>
    <th:block th:replace="~{fragments/common :: stylesheets}"></th:block>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 480px;">
        <div class="auth-brand">
            <i class="bi bi-building-check"></i>
            <span class="brand-font fs-4">CitizenConnect</span>
        </div>
        <h5 class="mb-1">Créer un compte citoyen</h5>
        <p class="text-muted small mb-4">Déposez et suivez vos réclamations auprès des services municipaux.</p>

        <form th:action="@{/register}" th:object="${userRegisterDTO}" method="post">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'" placeholder="Nom et prénom">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Adresse email</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="vous@exemple.com">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirmer</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Téléphone</label>
                <input type="text" th:field="*{phone}" class="form-control" placeholder="06 00 00 00 00">
            </div>
            <div class="mb-4">
                <label class="form-label">Adresse</label>
                <input type="text" th:field="*{address}" class="form-control" placeholder="Ville, quartier...">
            </div>
            <button type="submit" class="btn btn-primary w-100">Créer mon compte</button>
        </form>

        <hr class="my-4">
        <p class="text-center small mb-0">Déjà inscrit ? <a th:href="@{/login}">Se connecter</a></p>
    </div>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
