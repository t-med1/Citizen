<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catégories — CitizenConnect</title>
    <th:block th:replace="~{fragments/common :: stylesheets}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="app-shell">
    <aside th:replace="~{fragments/common :: sidebar}"></aside>
    <main class="app-content">
        <div th:replace="~{fragments/common :: flash-messages}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="mb-1">Catégories</h3>
                <p class="text-muted mb-0">Catégories de service utilisées pour classer les réclamations.</p>
            </div>
            <a th:href="@{/categories/new}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nouvelle catégorie</a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-app mb-0">
                    <thead><tr><th>Nom</th><th>Description</th><th>Réclamations</th><th class="text-end">Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="c : ${categories}">
                        <td class="fw-semibold" th:text="${c.name}">Catégorie</td>
                        <td th:text="${c.description} ?: '—'">Description</td>
                        <td><span class="badge text-bg-light text-dark" th:text="${c.complaintCount}">0</span></td>
                        <td class="text-end">
                            <a th:href="@{'/categories/' + ${c.id} + '/edit'}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{'/categories/' + ${c.id} + '/delete'}" method="post" class="d-inline"
                                  data-confirm="Supprimer cette catégorie ?">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4"><div class="empty-state"><i class="bi bi-tags"></i> Aucune catégorie</div></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
