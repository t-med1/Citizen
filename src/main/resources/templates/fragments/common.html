<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>fragments</title></head>
<body>

<th:block th:fragment="stylesheets">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</th:block>

<nav th:fragment="navbar" class="navbar navbar-expand app-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-building-check"></i>CitizenConnect</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <a class="nav-link position-relative" th:href="@{/notifications}" title="Notifications">
                <i class="bi bi-bell fs-5"></i>
                <span th:if="${unreadNotifCount != null and unreadNotifCount > 0}"
                      class="badge rounded-pill badge-notif position-absolute top-0 start-100 translate-middle"
                      th:text="${unreadNotifCount}">0</span>
            </a>
            <a class="nav-link" th:href="@{/profile}">
                <i class="bi bi-person-circle"></i>
                <span sec:authentication="name">user</span>
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>
    </div>
</nav>

<aside th:fragment="sidebar" class="app-sidebar">
    <nav class="nav flex-column">
        <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> Tableau de bord</a>
        <a class="nav-link" th:href="@{/complaints}"><i class="bi bi-card-checklist"></i> Réclamations</a>
        <a class="nav-link" sec:authorize="hasRole('CITIZEN')" th:href="@{/complaints/new}"><i class="bi bi-plus-circle"></i> Nouvelle réclamation</a>

        <div class="sidebar-section" sec:authorize="hasRole('ADMIN')">Administration</div>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/users}"><i class="bi bi-people"></i> Utilisateurs</a>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/roles}"><i class="bi bi-shield-lock"></i> Rôles</a>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/categories}"><i class="bi bi-tags"></i> Catégories</a>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/statistics}"><i class="bi bi-bar-chart-line"></i> Statistiques</a>

        <div class="sidebar-section">Compte</div>
        <a class="nav-link" th:href="@{/profile}"><i class="bi bi-person"></i> Mon profil</a>
        <a class="nav-link" th:href="@{/notifications}"><i class="bi bi-bell"></i> Notifications</a>
    </nav>
</aside>

<th:block th:fragment="flash-messages">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" data-auto-dismiss role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${successMessage}">Succès</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" data-auto-dismiss role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${errorMessage}">Erreur</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</th:block>

</body>
</html>
