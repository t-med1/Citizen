<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications — CitizenConnect</title>
    <th:block th:replace="~{fragments/common :: stylesheets}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="app-shell">
    <aside th:replace="~{fragments/common :: sidebar}"></aside>
    <main class="app-content">
        <div th:replace="~{fragments/common :: flash-messages}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Notifications</h3>
            <form th:action="@{/notifications/read-all}" method="post" th:if="${not #lists.isEmpty(notifications)}">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Tout marquer comme lu</button>
            </form>
        </div>

        <div class="card">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-start" th:each="n : ${notifications}"
                    th:style="${!n.read} ? 'background: var(--teal-100);' : ''">
                    <div>
                        <div th:text="${n.message}">Message de notification</div>
                        <div class="small text-muted" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">date</div>
                    </div>
                    <div class="text-end text-nowrap">
                        <a th:if="${n.link}" th:href="@{${n.link}}" class="btn btn-sm btn-outline-primary">Voir</a>
                        <form th:if="${!n.read}" th:action="@{'/notifications/' + ${n.id} + '/read'}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">Marquer lu</button>
                        </form>
                    </div>
                </li>
                <li class="list-group-item" th:if="${#lists.isEmpty(notifications)}">
                    <div class="empty-state"><i class="bi bi-bell"></i> Aucune notification</div>
                </li>
            </ul>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
