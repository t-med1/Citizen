<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit} ? 'Modifier utilisateur — CitizenConnect' : 'Nouvel utilisateur — CitizenConnect'">Utilisateur</title>
    <th:block th:replace="~{fragments/common :: stylesheets}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="app-shell">
    <aside th:replace="~{fragments/common :: sidebar}"></aside>
    <main class="app-content">
        <h3 class="mb-4" th:text="${isEdit} ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'">Formulaire</h3>

        <div class="card" style="max-width: 640px;">
            <div class="card-body">
                <form th:action="${isEdit} ? @{'/users/' + ${userId}} : @{/users}" th:object="${userDTO}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nom complet</label>
                        <input type="text" th:field="*{fullName}" class="form-control"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe <span class="text-muted fw-normal" th:if="${isEdit}">(laisser vide pour conserver l'actuel)</span></label>
                        <input type="password" th:field="*{password}" class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Téléphone</label>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Adresse</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rôles</label>
                        <div class="border rounded-3 p-3" th:classappend="${#fields.hasErrors('roleIds')} ? 'border-danger'">
                            <div class="form-check" th:each="role : ${roles}">
                                <input class="form-check-input" type="checkbox" th:field="*{roleIds}" th:value="${role.id}">
                                <label class="form-check-label" th:text="${role.name}">ROLE</label>
                            </div>
                        </div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('roleIds')}" th:errors="*{roleIds}"></div>
                    </div>
                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" th:field="*{enabled}">
                        <label class="form-check-label">Compte actif</label>
                    </div>

                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/users}" class="btn btn-outline-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
