<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Utilisateurs — CitizenConnect</title>
    <th:block th:replace="~{fragments/common :: stylesheets}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="app-shell">
    <aside th:replace="~{fragments/common :: sidebar}"></aside>
    <main class="app-content">
        <div th:replace="~{fragments/common :: flash-messages}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="mb-1">Utilisateurs</h3>
                <p class="text-muted mb-0">Gestion des comptes citoyens, agents et administrateurs.</p>
            </div>
            <a th:href="@{/users/new}" class="btn btn-primary"><i class="bi bi-person-plus"></i> Nouvel utilisateur</a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-app mb-0">
                    <thead>
                    <tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Rôles</th><th>Statut</th><th>Inscrit le</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.fullName}">Nom</td>
                        <td th:text="${u.email}">email</td>
                        <td th:text="${u.phone} ?: '—'">Téléphone</td>
                        <td>
                            <span class="badge bg-light text-dark me-1" th:each="r : ${u.roleNames}" th:text="${#strings.replace(r,'ROLE_','')}">ROLE</span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${u.enabled} ? 'text-bg-success' : 'text-bg-secondary'"
                                  th:text="${u.enabled} ? 'Actif' : 'Inactif'">Statut</span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td class="text-end">
                            <a th:href="@{'/users/' + ${u.id} + '/edit'}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{'/users/' + ${u.id} + '/delete'}" method="post" class="d-inline"
                                  data-confirm="Supprimer définitivement cet utilisateur ?">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7"><div class="empty-state"><i class="bi bi-people"></i> Aucun utilisateur</div></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
